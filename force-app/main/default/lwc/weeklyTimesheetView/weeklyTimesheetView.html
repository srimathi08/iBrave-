<template>
    <div class="timesheet-section">
        <!-- Single Row Header with All Actions -->
        <div class="compact-header">
            <div class="left-section">
                <lightning-button-icon
                    icon-name="utility:chevronleft"
                    alternative-text="Previous Week"
                    onclick={handlePrevWeek}
                    size="small"
                    class="nav-icon">
                </lightning-button-icon>
                
                <span class="week-display">
                    Week {currentWeekNumber}, {currentYear}
                </span>
                
                <lightning-button-icon
                    icon-name="utility:chevronright"
                    alternative-text="Next Week"
                    onclick={handleNextWeek}
                    disabled={isCurrentWeek}
                    size="small"
                    class="nav-icon">
                </lightning-button-icon>
            </div>

            <div class="center-section">
                <span class="date-range">{weekStartDate} - {weekEndDate}</span>
            </div>

            <div class="right-section">
                <lightning-button
                    label="Submit for Approval"
                    variant="brand"
                    onclick={handleWeeklySubmitForApproval}
                    disabled={disableSubmitButton}
                    size="small"
                    class="submit-btn">
                </lightning-button>
                
                <lightning-button-menu
                    alternative-text="Export"
                    icon-name="utility:download"
                    icon-size="small"
                    menu-alignment="right"
                    variant="border-filled">
                    <lightning-menu-item
                        value="excel"
                        label="Export Excel"
                        icon-name="doctype:excel"
                        onclick={handleExportExcel}>
                    </lightning-menu-item>
                    
                </lightning-button-menu>
            </div>
        </div>
     
        <!-- Timesheet Table -->
         <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Project</th>
                    <th>Task</th>
                    <th>Description</th>
                    <th>Regular Hours</th>
                    <th>Overtime Hours</th>
                    <th>Total Hours</th>
                    <th>Approval Status</th>
                </tr>
            </thead>
            <tbody>
                <template if:true={weeklyEntries.length}>
                    <template for:each={weeklyEntries} for:item="entry">
                        <tr key={entry.id}>
                            <td>
                                <div class="date-cell">
                                    <div class="date-main">{entry.date}</div>
                                    <div class="date-day">{entry.day}</div>
                                </div>
                            </td>
                            <td>{entry.project}</td>
                            <td>{entry.task}</td>
                            <td>{entry.description}</td>
                            <td class="hours-cell">{entry.hours}</td>
                            <td class="hours-cell">{entry.overtime}</td>
                            <td class="hours-cell total-hours">{entry.totalHours}</td>
                            <td>
                                
                                <span class={entry.statusClass}>{entry.approvalStatus}</span>
                            </td>
                        </tr>
                    </template>
                    <!-- Week Total Row -->
                    <tr class="total-summary-row">
                        <td class="total-label">
                            <strong>Week Total: {weekTotalHours} hours</strong>
                            <span class="total-breakdown">(Regular: {weekRegularHours}h, Overtime: {weekOvertimeHours}h)</span>
                        </td>
                        <td colspan="7"></td>
                    </tr>
                </template>
                <template if:false={weeklyEntries.length}>
                    <tr>
                        <td colspan="8" class="no-data-cell">
                            No entries found for this week
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
</div>
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>
    </div>
</template>
