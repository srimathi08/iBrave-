
<template>
    <lightning-card title="Convert Contact to User" icon-name="standard:user">
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Processing..." size="small"></lightning-spinner>
        </template>

        <div class="slds-p-around_medium">
            <!-- Contact Information Display -->
            <template if:true={contactData}>
                <!-- Main Info Box -->
                <div class="slds-box slds-box_small slds-theme_shade slds-m-bottom_small">
                    <dl class="slds-dl_horizontal">
                        <dt class="slds-dl_horizontal__label">
                            <p class="slds-text-title">Name:</p>
                        </dt>
                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                            <p><strong>{contactData.firstName} {contactData.lastName}</strong></p>
                        </dd>

                        <dt class="slds-dl_horizontal__label">
                            <p class="slds-text-title">Email:</p>
                        </dt>
                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                            <p>{contactData.email}</p>
                        </dd>

                        <dt class="slds-dl_horizontal__label">
                            <p class="slds-text-title">Employee ID:</p>
                        </dt>
                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                            <p>{contactData.employeeId}</p>
                        </dd>

                        <dt class="slds-dl_horizontal__label">
                            <p class="slds-text-title">Designation:</p>
                        </dt>
                        <dd class="slds-dl_horizontal__detail slds-tile__meta">
                            <p>{contactData.designation}</p>
                        </dd>
                    </dl>
                </div>

                <!-- License & Profile Information Box -->
                <div class="license-info-box slds-box slds-m-bottom_small">
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="info-card">
                                <lightning-icon icon-name="utility:contact" size="small"></lightning-icon>
                                <p class="slds-text-body_small slds-m-top_xx-small slds-text-color_weak">Employee Category</p>
                                <p class="slds-text-heading_small slds-m-top_xx-small"><strong>{userTypeDisplay}</strong></p>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="info-card">
                                <lightning-icon icon-name={licenseIcon} size="small"></lightning-icon>
                                <p class="slds-text-body_small slds-m-top_xx-small slds-text-color_weak">User License</p>
                                <p class="slds-text-heading_small slds-m-top_xx-small">
                                    <span class={licenseBadgeClass}>{userLicenseDisplay}</span>
                                </p>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="info-card">
                                <lightning-icon icon-name="utility:shield" size="small"></lightning-icon>
                                <p class="slds-text-body_small slds-m-top_xx-small slds-text-color_weak">Profile</p>
                                <p class="slds-text-heading_small slds-m-top_xx-small"><strong>{profileDisplay}</strong></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- License Mapping Guide Toggle -->
                <div class="slds-m-bottom_small">
                    <lightning-button 
                        variant="neutral" 
                        label={licenseInfoButtonLabel}
                        icon-name="utility:knowledge_base"
                        onclick={toggleLicenseInfo}
                        class="slds-m-bottom_x-small">
                    </lightning-button>
                </div>

                <!-- License Mapping Guide (Expandable) -->
                <template if:true={showLicenseInfo}>
                    <div class="slds-box slds-box_small slds-m-bottom_small license-guide-box">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">
                            <lightning-icon icon-name="utility:table" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            License & Profile Mapping Guide
                        </h3>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col"><div class="slds-truncate">Employee Category</div></th>
                                    <th scope="col"><div class="slds-truncate">User License</div></th>
                                    <th scope="col"><div class="slds-truncate">Profile</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={licenseMappingInfo} for:item="mapping">
                                    <tr key={mapping.userType} class="slds-hint-parent">
                                        <td data-label="Employee Category">
                                            <div class="slds-truncate">
                                                <lightning-icon icon-name={mapping.icon} size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                                {mapping.userType}
                                            </div>
                                        </td>
                                        <td data-label="User License">
                                            <div class="slds-truncate"><strong>{mapping.license}</strong></div>
                                        </td>
                                        <td data-label="Profile">
                                            <div class="slds-truncate">{mapping.profile}</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- Field Mapping Toggle Section -->
                <div class="slds-m-bottom_small">
                    <lightning-button 
                        variant="neutral" 
                        label={fieldMappingButtonLabel}
                        icon-name="utility:expand_alt"
                        onclick={toggleFieldMapping}
                        class="slds-m-bottom_x-small">
                    </lightning-button>
                </div>

                <!-- Field Mapping Details (Expandable) -->
                <template if:true={showFieldMapping}>
                    <div class="slds-box slds-box_small slds-m-bottom_small field-mapping-box">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">
                            <lightning-icon icon-name="utility:metrics" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            Field Mapping Details
                        </h3>
                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <template for:each={fieldMappings} for:item="field">
                                <div key={field.label} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                                    <div class="slds-box slds-box_x-small slds-theme_shade field-item">
                                        <div class="slds-media slds-media_center">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name={field.icon} size="x-small"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <p class="slds-text-body_small slds-text-color_weak">{field.label}</p>
                                                <p class="slds-text-body_regular"><strong>{field.value}</strong></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="slds-m-top_small">
                            <p class="slds-text-body_small slds-text-color_weak">
                                <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                All these fields will be mapped from Contact to User upon conversion.
                            </p>
                        </div>
                    </div>
                </template>

                <!-- Existing User Warning -->
                <template if:true={contactData.hasExistingUser}>
                    <div class="existing-user-warning">
                        <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_small" role="alert">
                            <span class="slds-assistive-text">Warning</span>
                            <span class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small">
                                <lightning-icon icon-name="utility:warning" alternative-text="Warning" size="x-small" variant="warning"></lightning-icon>
                            </span>
                            <h2>
                                <strong>User Already Exists:</strong> A user with email <strong>{contactData.email}</strong> already exists 
                                (Username: {contactData.existingUsername})
                            </h2>
                        </div>
                    </div>
                </template>

                <!-- No Employee Category Warning -->
                <template if:false={contactData.contactUserType}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_small" role="alert">
                        <span class="slds-assistive-text">Info</span>
                        <span class="slds-icon_container slds-icon-utility-info slds-m-right_x-small">
                            <lightning-icon icon-name="utility:info" alternative-text="Info" size="x-small"></lightning-icon>
                        </span>
                        <h2>
                            Please select an <strong>Employee Category</strong> before converting to user.
                        </h2>
                    </div>
                </template>

                <!-- Action Buttons -->
                <div class="slds-m-top_medium">
                    <lightning-button 
                        variant="brand" 
                        label="Convert to User" 
                        title="Convert Contact to User"
                        onclick={handleConvert} 
                        disabled={isLoading}
                        icon-name="utility:add"
                        class="slds-m-right_small convert-button">
                    </lightning-button>
                </div>

                <!-- Information Section -->
                <div class="slds-box slds-box_small slds-theme_info slds-m-top_medium">
                    <p class="slds-text-body_small">
                        <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <strong>Note:</strong> Converting this contact will create a new user account with the appropriate license and profile based on the Employee Category, map all custom fields, and send login credentials via email.
                    </p>
                </div>
            </template>
        </div>

        <!-- Modal for Success/Error Messages -->
        <template if:true={showModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class={modalVariantClass}>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                                title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-text-longform modal-content">
                            <lightning-formatted-text value={modalMessage}></lightning-formatted-text>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="brand" label="Close" title="Close" onclick={closeModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
