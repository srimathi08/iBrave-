<template>
    <div class="slds-grid slds-grid_vertical-stretch slds-wrap app-container">
        <!-- Header Section -->
        <header class="slds-col slds-size_1-of-1 app-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium">
            <!-- Company Logo / Menu Toggle -->
            <div class="slds-col slds-grid slds-grid_vertical-align-center">
                <button class="slds-button slds-button_icon slds-button_icon-inverse slds-m-right_small"
                        onclick={toggleSidebar}>
                    <lightning-icon icon-name="utility:threedots_vertical" alternative-text="Toggle Menu" title="Toggle Menu"></lightning-icon>
                </button>
                <div class="company-logo">
                    <img src={quadrobayLogoUrl} alt="Company Logo" class="slds-m-right_small" />
                </div>
                <div class="slds-text-heading_medium slds-text-color_inverse slds-hide_small">My Space</div>
            </div>

            <!-- Header Icons -->
            <div class="slds-col slds-grid slds-grid_vertical-align-center">
                <lightning-icon icon-name="utility:search" alternative-text="Search" title="Search" class="slds-p-horizontal_small slds-icon-inverse"></lightning-icon>
                <lightning-icon icon-name="utility:notification" alternative-text="Notifications" title="Notifications" class="slds-p-horizontal_small slds-icon-inverse"></lightning-icon>
                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add" class="slds-p-horizontal_small slds-icon-inverse"></lightning-icon>
                <lightning-icon icon-name="utility:user" alternative-text="User" title="User" class="slds-p-horizontal_small slds-icon-inverse"></lightning-icon>
            </div>
        </header>

        <!-- Main Content Area (Sidebar + Main Content) -->
        <div class="slds-col slds-size_1-of-1 slds-grid slds-wrap main-layout">
            <!-- Vertical Navigation Sidebar -->
            <nav class={sidebarClass}>
                <ul class="slds-nav-vertical">
                    <!-- Navigation Menu Items -->
                    <template for:each={navItems} for:item="item">
                        <li key={item.id} class="slds-nav-vertical__item">
                            <a href="javascript:void(0);"
                               class="slds-nav-vertical__action {activePage == item.id ? 'slds-is-active' : ''}"
                               onclick={handleNavigation}
                               data-id={item.id}>
                                <lightning-icon icon-name={item.icon} size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                <span class={navTextClass}>{item.label}</span>
                            </a>
                        </li>
                    </template>
                </ul>
            </nav>

            <!-- Main Content Display Area -->
            <main class={mainContentClass}>
                <!-- Conditional rendering for different pages -->
                <template if:true={isHomePage}>
                    <div class="slds-box slds-theme_default slds-m-bottom_medium">
                        <h2 class="slds-text-heading_large slds-m-bottom_small">Overview</h2>
                        <p>This is the content for the Home/Overview page. You can add your dashboard components here.</p>
                        <!-- Example of a card as seen in the image -->
                        <div class="slds-card slds-m-top_medium">
                            <div class="slds-card__header slds-grid">
                                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="standard:user" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            <a href="javascript:void(0);" class="slds-card__header-link slds-text-heading_small">
                                                <span>1-testaisfdc</span>
                                            </a>
                                        </h2>
                                    </div>
                                </header>
                            </div>
                            <div class="slds-card__body slds-card__body_inner">
                                <p>Out</p>
                                <div class="slds-grid slds-grid_align-spread slds-m-top_small">
                                    <span>00 : 00 : 00</span>
                                    <lightning-button variant="brand" label="Check-In" title="Check-In" onclick={handleCheckIn}></lightning-button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template if:true={isOnboardingPage}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_large">Onboarding Page</h2>
                        <p>Content for Onboarding goes here.</p>
                    </div>
                </template>

                <template if:true={isTimeTrackerPage}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_large">Time Tracker Page</h2>
                        <p>Content for Time Tracker goes here.</p>
                    </div>
                </template>

                <template if:true={isAttendancePage}>
                    <template if:true={isAttendancePage}>
    <c-attendance></c-attendance>
</template>

                </template>

                <template if:true={isMorePage}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_large">More Options</h2>
                        <p>Content for More options goes here.</p>
                    </div>
                </template>

                <template if:true={isOperationsPage}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_large">Operations Page</h2>
                        <p>Content for Operations goes here.</p>
                    </div>
                </template>

                <template if:true={isReportsPage}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_large">Reports Page</h2>
                        <p>Content for Reports goes here.</p>
                    </div>
                </template>
            </main>
        </div>
    </div>
</template>
