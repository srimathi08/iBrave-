<template>
    <div class="attendance-container">
        <!-- Header Section -->
        <div class="attendance-header">
            <h2 class="slds-text-heading_medium slds-text-color_inverse">Attendance Tracker</h2>
            <div class="current-time">{currentTime}</div>
        </div>

        <!-- Main Check-in/out Section -->
        <div class="checkin-section slds-card">
            <div class="timer-display">
                <div class="timer-circle">
                    <div class="timer-text">
                        <div class="time-value">{displayTime}</div>
                        <div class="time-label">{timerLabel}</div>
                    </div>
                </div>
            </div>

            <div class="checkin-controls">
                <button 
                    class={checkInButtonClass}
                    onclick={handleCheckInOut}
                    disabled={isProcessing}>
                    <lightning-icon 
                        icon-name={buttonIcon} 
                        size="small" 
                        class="button-icon">
                    </lightning-icon>
                    {buttonLabel}
                </button>
                
                <template if:true={isProcessing}>
                    <div class="processing-indicator">
                        <lightning-spinner alternative-text="Processing..." size="small"></lightning-spinner>
                        <span class="processing-text">{processingMessage}</span>
                    </div>
                </template>
            </div>

            <!-- Location Info -->
            <template if:true={showLocationInfo}>
                <div class="location-info slds-m-top_medium">
                    <div class="info-item">
                        <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                        <span class="info-text">{currentAddress}</span>
                    </div>
                </div>
            </template>

            <!-- Camera Section -->
            <template if:true={showCamera}>
                <div class="camera-section slds-m-top_medium">
                    <div class="camera-container">
                        <video lwc:ref="videoElement" class="camera-preview" autoplay muted playsinline></video>
                        <canvas lwc:ref="canvasElement" class="camera-canvas"></canvas>
                    </div>
                    <div class="camera-controls">
                        <button class="slds-button slds-button_neutral capture-btn" onclick={captureImage}>
                            <lightning-icon icon-name="utility:photo" size="small"></lightning-icon>
                            Capture Photo
                        </button>
                        <button class="slds-button slds-button_neutral" onclick={cancelCamera}>
                            Cancel
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Today's Summary -->
        <div class="summary-section slds-card slds-m-top_medium">
            <h3 class="slds-text-heading_small slds-m-bottom_small">Today's Summary</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">Check-in Time</div>
                    <div class="summary-value">{todayCheckIn}</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Check-out Time</div>
                    <div class="summary-value">{todayCheckOut}</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Total Hours</div>
                    <div class="summary-value">{todayTotalHours}</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Status</div>
                    <div class={statusBadgeClass}>{todayStatus}</div>
                </div>
            </div>
        </div>

        <!-- Recent History -->
        <div class="history-section slds-card slds-m-top_medium">
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                <h3 class="slds-text-heading_small">Recent History</h3>
                <button class="slds-button slds-button_neutral" onclick={refreshHistory}>
                    <lightning-icon icon-name="utility:refresh" size="x-small"></lightning-icon>
                    Refresh
                </button>
            </div>
            
            <template if:true={hasHistory}>
                <div class="history-list">
                    <template for:each={attendanceHistory} for:item="record">
                        <div key={record.Id} class="history-item">
                            <div class="history-date">{record.FormattedDate}</div>
                            <div class="history-details">
                                <div class="history-times">
                                    <span class="checkin-time">In: {record.FormattedCheckIn}</span>
                                    <span class="checkout-time">Out: {record.FormattedCheckOut}</span>
                                </div>
                                <div class="history-duration">{record.FormattedHours}</div>
                            </div>
                            <div class={record.StatusClass}>{record.Status}</div>
                        </div>
                    </template>
                </div>
            </template>
            
            <template if:false={hasHistory}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:clock" size="large" class="empty-icon"></lightning-icon>
                    <p class="empty-message">No attendance records found</p>
                </div>
            </template>
        </div>
    </div>
</template>
