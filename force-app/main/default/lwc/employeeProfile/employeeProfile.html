<template>
    <div class="employee-profile-wrapper">
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <div class="profile-layout">
                <!-- Left Sidebar - Profile Card -->
                <div class="profile-sidebar">
                    <div class="profile-card">
                        <!-- Gradient Banner -->
                        <div class="profile-banner"></div>

                        <!-- Profile Photo Section -->
                        <div class="profile-photo-wrapper">
                            <div class="photo-container">
                                <div class="photo-ring">
                                    <img src={displayPhotoUrl} alt={employeeData.name} class="profile-photo" />
                                </div>
                                <div class="online-indicator"></div>
                            </div>
                        </div>

                        <!-- Employee Info -->
                        <div class="profile-info">
                            <h2 class="employee-name">{employeeData.name}</h2>
                            <p class="employee-title">{employeeData.title}</p>

                            <template if:true={employeeData.employeeId}>
                                <div class="employee-badge">
                                    <lightning-icon icon-name="utility:identity" size="xx-small"></lightning-icon>
                                    <span>{employeeData.employeeId}</span>
                                </div>
                            </template>
                        </div>

                        <!-- Stats Grid -->
                        <div class="stats-container">
                            <div class="stat-box">
                                <div class="stat-value">{employeeData.yearsOfExperience}</div>
                                <div class="stat-label">Years Exp.</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">{employeeData.projectsCompleted}</div>
                                <div class="stat-label">Projects</div>
                            </div>
                        </div>

                        <!-- Quick Info -->
                        <div class="quick-info">
                            <template if:true={employeeData.consultant}>
                                <div class="info-badge">
                                    <lightning-icon icon-name="utility:company" size="xx-small"></lightning-icon>
                                    <span>{employeeData.consultant}</span>
                                </div>
                            </template>

                            <div class="info-badge status-active">
                                <lightning-icon icon-name="utility:success" size="xx-small"></lightning-icon>
                                <span>{employeeData.status}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Content - Details (READ ONLY) -->
                <div class="profile-content">
                    <!-- Basic Information Card -->
                    <div class="info-section">
                        <div class="section-header">
                            <div class="header-left">
                                <div class="section-icon-wrapper">
                                    <lightning-icon icon-name="utility:user" size="small"
                                        class="section-icon"></lightning-icon>
                                </div>
                                <h3 class="section-title">Basic Information</h3>
                            </div>
                            <div class="readonly-badge">
                                <lightning-icon icon-name="utility:lock" size="xx-small"></lightning-icon>
                                <span>Read Only</span>
                            </div>
                        </div>

                        <div class="section-body">
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <label class="detail-label">Full Name</label>
                                    <div class="detail-value">{employeeData.name}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Employee ID</label>
                                    <div class="detail-value">{employeeData.employeeId}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Designation</label>
                                    <div class="detail-value">{employeeData.title}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Department</label>
                                    <div class="detail-value">{employeeData.department}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Date of Joining</label>
                                    <div class="detail-value">{employeeData.dateOfJoining}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Employment Type</label>
                                    <div class="detail-value">
                                        <span class="status-pill">{employeeData.status}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Information Card -->
                    <div class="info-section">
                        <div class="section-header">
                            <div class="header-left">
                                <div class="section-icon-wrapper contact">
                                    <lightning-icon icon-name="utility:phone_portrait" size="small"
                                        class="section-icon"></lightning-icon>
                                </div>
                                <h3 class="section-title">Contact Information</h3>
                            </div>
                            <div class="readonly-badge">
                                <lightning-icon icon-name="utility:lock" size="xx-small"></lightning-icon>
                                <span>Read Only</span>
                            </div>
                        </div>

                        <div class="section-body">
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <label class="detail-label">Email Address</label>
                                    <div class="detail-value">{employeeData.email}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Phone Number</label>
                                    <div class="detail-value">{employeeData.phone}</div>
                                </div>

                                <div class="detail-item full-width">
                                    <label class="detail-label">Address</label>
                                    <div class="detail-value address-text">{formattedAddress}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Emergency Contact Name</label>
                                    <div class="detail-value">{employeeData.emergencyContactName}</div>
                                </div>

                                <div class="detail-item">
                                    <label class="detail-label">Emergency Contact</label>
                                    <div class="detail-value">{employeeData.emergencyContactPhone}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Education & Certifications Card -->
                    <div class="info-section">
                        <div class="section-header">
                            <div class="header-left">
                                <div class="section-icon-wrapper education">
                                    <lightning-icon icon-name="utility:education" size="small"
                                        class="section-icon"></lightning-icon>
                                </div>
                                <h3 class="section-title">My Certificates</h3>
                            </div>
                            <lightning-button label="Upload Certificate" variant="brand" icon-name="utility:add"
                                onclick={handleAddCertificateClick}>
                            </lightning-button>
                        </div>

                        <div class="section-body">
                            <template if:true={hasEducation}>
                                <div class="education-list">
                                    <template for:each={educationList} for:item="edu">
                                        <div key={edu.id} class="education-card">
                                            <!-- Certificate Row (always visible, compact) -->
                                            <div class="edu-row">
                                                <div class="edu-icon-small">
                                                    <lightning-icon icon-name="standard:file"
                                                        size="small"></lightning-icon>
                                                </div>
                                                <div class="edu-details-compact">
                                                    <div class="edu-title-row">
                                                        <h4 class="edu-title">{edu.certificateName}</h4>
                                                        <span class="status-badge"
                                                            data-status={edu.status}>{edu.status}</span>
                                                    </div>
                                                    <div class="edu-subtitle">
                                                        <span class="edu-type-inline">{edu.certificateType}</span>
                                                        <template if:true={edu.institution}>
                                                            <span class="edu-separator">·</span>
                                                            <span class="edu-inst-inline">{edu.institution}</span>
                                                        </template>
                                                        <template if:true={edu.issueDate}>
                                                            <span class="edu-separator">·</span>
                                                            <span class="edu-date-inline">{edu.issueDate}</span>
                                                        </template>
                                                    </div>
                                                </div>
                                                <div class="edu-row-actions">
                                                    <!-- Attachment toggle button -->
                                                    <template if:true={edu.hasFiles}>
                                                        <button class="attachment-toggle" data-id={edu.id}
                                                            onclick={toggleAttachments} title="Show/Hide Attachments">
                                                            <lightning-icon icon-name={edu.chevronIcon}
                                                                size="xx-small"></lightning-icon>
                                                            <span class="attach-count">{edu.fileCount}</span>
                                                        </button>
                                                    </template>
                                                    <lightning-button-icon icon-name="utility:delete" variant="bare"
                                                        alternative-text="Delete Certificate" title="Delete Certificate"
                                                        data-id={edu.id} onclick={handleEducationDelete}
                                                        class="delete-btn">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>

                                            <!-- Collapsible Attached Files -->
                                            <template if:true={edu.isExpanded}>
                                                <div class="files-section-collapsible">
                                                    <template if:true={edu.attachedFiles}>
                                                        <template if:true={edu.attachedFiles.length}>
                                                            <div class="files-list-compact">
                                                                <template for:each={edu.attachedFiles} for:item="file">
                                                                    <div key={file.contentDocumentId}
                                                                        class="file-item-compact">
                                                                        <div class="file-info-compact">
                                                                            <lightning-icon icon-name={file.fileType}
                                                                                size="xx-small"
                                                                                class="file-icon-small"></lightning-icon>
                                                                            <span
                                                                                class="file-name-compact">{file.title}</span>
                                                                            <span
                                                                                class="file-ext">{file.fileExtension}</span>
                                                                        </div>
                                                                        <div class="file-actions-compact">
                                                                            <lightning-button-icon
                                                                                icon-name="utility:download"
                                                                                variant="bare" size="small"
                                                                                alternative-text="Download"
                                                                                title="Download"
                                                                                data-url={file.downloadUrl}
                                                                                onclick={handleFileDownload}>
                                                                            </lightning-button-icon>
                                                                            <lightning-button-icon
                                                                                icon-name="utility:delete"
                                                                                variant="bare" size="small"
                                                                                alternative-text="Delete" title="Delete"
                                                                                data-fileid={file.contentDocumentId}
                                                                                onclick={handleFileDelete}>
                                                                            </lightning-button-icon>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={hasEducation}>
                                <div class="empty-state">
                                    <lightning-icon icon-name="utility:file" size="large"></lightning-icon>
                                    <p class="empty-message">No certificates uploaded yet</p>
                                    <p class="empty-hint">Click "Upload Certificate" to add your documents</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Certificate Upload Modal -->
        <template if:true={showCertificateUpload}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container modal-container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" title="Close"
                            onclick={handleCertificateUploadCancel}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title">Upload Certificate</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium modal-content">
                        <div class="form-section">
                            <lightning-input label="Certificate Name" value={certificateData.name} data-field="name"
                                required placeholder="e.g., Bachelor of Engineering"
                                onchange={handleCertificateFieldChange}>
                            </lightning-input>

                            <lightning-combobox label="Certificate Type" value={certificateData.type} data-field="type"
                                placeholder="Select certificate type" options={certificateTypeOptions} required
                                onchange={handleCertificateFieldChange}>
                            </lightning-combobox>

                            <lightning-input label="Institution/Organization" value={certificateData.institution}
                                data-field="institution" placeholder="e.g., University Name or Company"
                                onchange={handleCertificateFieldChange}>
                            </lightning-input>

                            <lightning-input type="date" label="Issue Date" value={certificateData.issueDate}
                                data-field="issueDate" onchange={handleCertificateFieldChange}>
                            </lightning-input>

                            <lightning-input label="Certificate Number (Optional)"
                                value={certificateData.certificateNumber} data-field="certificateNumber"
                                placeholder="e.g., CERT-2024-001" onchange={handleCertificateFieldChange}>
                            </lightning-input>

                            <div class="file-upload-section">
                                <label class="slds-form-element__label">
                                    <abbr class="slds-required" title="required">* </abbr>
                                    Upload Certificate File
                                </label>
                                <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
                                    onchange={handleCertificateFileChange} class="file-input"
                                    disabled={isUploadingCertificate} />
                                <template if:true={certificateData.fileName}>
                                    <p class="file-selected">
                                        <lightning-icon icon-name="utility:file" size="xx-small"></lightning-icon>
                                        {certificateData.fileName}
                                    </p>
                                </template>
                                <p class="help-text">Accepted: PDF, Images, Word (Max 10MB)</p>
                            </div>
                        </div>
                        <template if:true={isUploadingCertificate}>
                            <div class="upload-progress">
                                <lightning-spinner alternative-text="Uploading certificate..."
                                    size="small"></lightning-spinner>
                                <p class="upload-message">Uploading certificate, please wait...</p>
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCertificateUploadCancel}
                            disabled={isUploadingCertificate}>
                        </lightning-button>
                        <lightning-button label={uploadCertificateButtonLabel} variant="brand"
                            onclick={handleCertificateUpload} disabled={isCertificateUploadDisabled}
                            icon-name={uploadCertificateIcon} class="upload-btn">
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
